<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>JetNetDNS Monitor</title>
	<link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/pihole_logo.svg') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
	<header class="topbar">
		<div class="brand">
			<img
				src="{{ url_for('static', filename='img/pihole_logo.svg') }}"
				alt="Pi-hole logo"
				class="brand-logo"
			>

			<div class="brand-text">
				<h1>JetNetDNS Monitor</h1>
				<p>Pi-hole and DNS server status</p>
			</div>
		</div>

		<div class="status-pill" id="status-pill">Checking...</div>
	</header>

	<main class="page">
		{% block content %}{% endblock %}
	</main>

	<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
